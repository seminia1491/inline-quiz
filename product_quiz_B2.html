<style>

.opt:hover{background:#f5f5f3}.opt.sel{border-color:#534AB7;background:#EEEDFE}.opt.ok{border-color:#1D9E75;background:#E1F5EE;cursor:default}.opt.no{border-color:#E24B4A;background:#FCEBEB;cursor:default}
.opt.ok .ol{background:#1D9E75;color:#fff}.opt.no .ol{background:#E24B4A;color:#fff}.opt.sel .ol{background:#534AB7;color:#fff}

.rf{margin-top:.5rem;font-size:12px;opacity:.8}.sca{width:100%;padding:.75rem 1rem;border:0.5px solid rgba(0,0,0,0.12);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:90px;color:#1a1a18}.sca:focus{outline:none;border-color:#534AB7}

.rh2.p{background:#E1F5EE;color:#085041}.rh2.f{background:#FCEBEB;color:#791F1F}.rb{padding:.75rem 1rem;font-size:13px;color:#5f5e5a;line-height:1.6;border-top:0.5px solid rgba(0,0,0,0.08)}

  <div class="header"><h1>產品知識測驗 — B2</h1><p>20 題・TMS / AI Call / Chatbot / EDM / Ocard 串接・全新題目</p></div>

<script>
const QS=[
{type:'mc',topic:'TMS',q:'TMS 的「翻桌預測」功能對餐廳的實際幫助是什麼？',opts:['告訴廚房什麼時候出菜','讓前台看到每張桌子預計幾點空出來，更精準安排候位和接受訂位，減少過度等待或過度接單','幫老闆預測今天的營業額','讓員工知道幾點可以下班'],ans:1,explain:'翻桌預測讓前台有根據地說「大概還要等 20 分鐘」，而不是憑感覺。同時也避免接了太多訂位但桌子根本翻不出來的超訂問題。',ref:'📦 Product Knowledge > TMS'},
{type:'mc',topic:'TMS',q:'TMS 多門市管理功能，對連鎖餐廳最大的價值是什麼？',opts:['讓每家分店都用不同的系統','讓老闆在一個後台看到所有門市的桌況和訂位狀況，不用分別登入每家店','讓分店老闆自己管自己的','讓所有分店共用同一個桌位'],ans:1,explain:'連鎖餐廳的痛點是管多門市很麻煩，要分別看每家店的狀況。TMS 多門市功能讓總部一個後台就能掌握所有店的即時狀況，大幅降低管理複雜度。',ref:'📦 Product Knowledge > TMS'},
{type:'mc',topic:'TMS',q:'客戶說「我的餐廳很小，只有 8 張桌子，TMS 有必要嗎？」你應該怎麼回應？',opts:['「您的餐廳太小，TMS 不適合您。」','「桌數少不代表管理壓力小。您的 8 張桌子如果尖峰時段都客滿，候位管理和翻桌時間的掌握反而更重要。您現在候位是怎麼管的？」','「當然有必要，每個餐廳都需要 TMS。」','「那我們賣您便宜一點好了。」'],ans:1,explain:'小餐廳的翻桌壓力不見得低，每張桌子都是錢。不要直接說需要或不需要，用問題讓他說出他的候位管理現況，再判斷 TMS 的切入點。',ref:'📦 Product Knowledge > TMS'},
{type:'mc',topic:'LINE AI Call',q:'LINE AI Call 如何與餐廳現有的 LINE 官方帳號整合？',opts:['要重新開一個新的 LINE 官帳','直接連結到餐廳現有的 LINE 官帳，電話進來 AI 接聽後，整理的訊息推送到同一個 LINE 官帳','需要買 LINE 的企業帳號才能用','LINE AI Call 跟 LINE 官帳是獨立的，不會整合'],ans:1,explain:'LINE AI Call 直接整合到餐廳現有的 LINE 官帳，不需要另開帳號。AI 接聽電話後，整理的訊息推送到同一個 LINE 官帳，餐廳員工在同一個地方看訊息。',ref:'📦 Product Knowledge > LINE AI Call'},
{type:'mc',topic:'LINE AI Call',q:'客戶說「我的電話量很少，一天大概只有 3–5 通」，LINE AI Call 適合他嗎？',opts:['完全適合，任何電話量都需要','需要進一步問：這 3–5 通裡面有沒有因為忙而漏接的？如果沒有漏接，AI Call 的切入點就比較弱','完全不適合，電話量太少','說「那您改用 LINE 聊天就好了」'],ans:1,explain:'電話量少但每通都接得到，AI Call 的急迫性確實不高。但要確認有沒有漏接——就算 3 通，如果有 1 通在尖峰時段漏接了，那對餐廳的損失還是真實存在的。',ref:'📦 Product Knowledge > LINE AI Call'},
{type:'mc',topic:'AI Chatbot',q:'AI Chatbot 的設定流程大概是什麼？（讓客戶理解導入門檻）',opts:['需要工程師寫程式，非常複雜','餐廳把常見問題和答案輸入系統，AI 學習後就可以自動回覆，不需要技術背景','客戶自己設計 AI 的對話流程','只能回答 inline 系統預設的問題'],ans:1,explain:'AI Chatbot 的設定就像填一份 FAQ：把你的開門時間、停車場、包廂等常見問題和答案輸入進去，AI 就會學習並自動回覆。不需要技術背景，導入門檻低。',ref:'📦 Product Knowledge > AI Chatbot'},
{type:'mc',topic:'AI Chatbot',q:'客戶說「我擔心客人不喜歡跟機器人聊天，會覺得我們不重視他們。」你怎麼回？',opts:['「那您不要用 AI Chatbot 比較好。」','「這個顧慮很真實。不過 AI Chatbot 處理的是「幾點開門、有沒有停車場」這類問題，客人其實更在意能不能立刻得到答案——AI 可以 24 小時即時回，比等員工有空回更快。重要的人際互動還是員工處理。」','「現在的 AI 很厲害，客人不會發現的。」','「我們的 AI 設計得很有人情味。」'],ans:1,explain:'客人不在意是不是 AI 回的「幾點開門」，他們在意的是「能不能立刻得到答案」。AI Chatbot 讓標準問題回得更快，員工把時間留給真正需要人際互動的部分。',ref:'📦 Product Knowledge > AI Chatbot'},
{type:'mc',topic:'AI EDM',q:'「AI 生成行銷文案」這個功能，對餐廳老闆最實際的幫助是什麼？',opts:['讓老闆不用管 Email 的任何事情','老闆不需要有行銷或寫作背景，AI 根據活動主題、目標客群自動生成文案，老闆只需要審核和調整即可','讓文案翻譯成多種語言','讓 Email 設計更漂亮'],ans:1,explain:'很多餐廳老闆想做 Email 行銷，但沒有人會寫文案。AI 文案生成解決了這個瓶頸——老闆說「我要做周年慶活動」，AI 出草稿，老闆微調後發出，不需要請行銷人員。',ref:'📦 Product Knowledge > AI EDM'},
{type:'mc',topic:'AI EDM',q:'客戶說「我有 1000 個會員的 Email，但從來沒發過信。」這是什麼信號？',opts:['對方不適合 AI EDM','這是非常好的切入點——有資料 + 還沒用過 = 即時可以啟動的 EDM 潛力，AI EDM 可以幫他把這 1000 個睡著的會員喚醒','對方已經有 EDM 工具了','先問他為什麼沒有發信'],ans:1,explain:'有 1000 個 Email 但從沒發過信，這批資料就是沉睡的資產。AI EDM 的最佳切入場景——有資料、有需求、只差一個簡單的工具就能啟動。',ref:'📦 Product Knowledge > AI EDM'},
{type:'mc',topic:'AI EDM',q:'Email 行銷的「開信率」指的是什麼？這個數字重要嗎？',opts:['客人打開信箱的比例，不重要','收到 Email 的人裡面，有多少人打開來看。這個數字反映 Email 主旨和發送時間的效果，是衡量 EDM 品質的重要指標','客人點擊信裡面連結的比例','客人把信轉寄給朋友的比例'],ans:1,explain:'開信率 = 有打開 / 有收到。業界平均大約 20–25%，餐廳類型通常更高。主旨好不好、什麼時間發都會影響開信率。AI EDM 的追蹤功能讓你知道哪次發信效果最好。',ref:'📦 Product Knowledge > AI EDM'},
{type:'mc',topic:'Ocard 串接',q:'如果一家餐廳老闆問「Ocard 和 inline 是同一家公司嗎？」你應該怎麼說？',opts:['「對，我們是同一家。」','「不是，Ocard 是獨立的第三方會員行銷平台，不是 inline 的一部分。我們跟 Ocard 有免費串接，您需要自己申辦 Ocard 帳號，但串接這件事 inline 不收費。」','「我不清楚，你去問 Ocard。」','「是合作夥伴，跟同一家差不多。」'],ans:1,explain:'必須說清楚：Ocard 是獨立的第三方公司，不是 inline 的子公司或同一家。inline 跟 Ocard 有免費串接合作，串接不收費，但客戶需要自己申辦 Ocard。搞混了會讓客戶對產品範圍產生誤解。',ref:'📦 Product Knowledge > Ocard 串接'},
{type:'mc',topic:'Ocard 串接',q:'串接 Ocard 之後，餐廳可以「更容易掌握消費者」，具體是指什麼？',opts:['看到客人的個人資料和身份證','把 inline 的訂位、來店資料和 Ocard 的會員行為資料打通，讓餐廳更完整地了解每個客人的消費模式','讓客人在 Ocard 上填更多個人資料','讓 Ocard 幫餐廳管理所有的客服'],ans:1,explain:'掌握消費者 = 把分散的資料打通。inline 有訂位資料（誰來、幾點來、幾人），Ocard 有消費行為和會員資料（消費金額、頻率、喜好）。兩者串接後，餐廳對每個客人的了解更立體。',ref:'📦 Product Knowledge > Ocard 串接'},
{type:'mc',topic:'產品綜合',q:'一家有 2 個分店的串燒居酒屋，痛點是「每到周末電話轟炸，員工接不完，加上 LINE 訊息也很多」，最合適的產品組合是？',opts:['TMS + AI EDM','LINE AI Call + AI Chatbot（電話用 AI Call 補漏接，LINE 訊息用 Chatbot 自動回）','Ocard 串接 + TMS','AI EDM + Ocard 串接'],ans:1,explain:'電話漏接 → LINE AI Call；LINE 訊息量大 → AI Chatbot。這兩個解決的是同一個根本問題：渠道太多、員工不夠用。這個組合是最直接的對應。',ref:'📞 Sales Playbook > 產品定位'},
{type:'mc',topic:'產品綜合',q:'下列哪個說法關於「產品導入順序」是正確的？',opts:['一次導入所有產品效果最好','根據最迫切的痛點先導入一個，讓客戶看到效果，再逐步擴展到其他產品','先導入最便宜的產品','先導入最複雜的產品，解決了就什麼都好了'],ans:1,explain:'導入順序是有策略的——先解決最痛的問題，讓客戶有信心，再擴展。一次導入太多，任何一個沒用好都可能讓整個關係崩掉。',ref:'📞 Sales Playbook > 產品定位'},
{type:'mc',topic:'產品綜合',q:'客戶說「你們的 AI 產品這麼多，我怕 AI 做太多，員工沒事做。」你怎麼回應？',opts:['「AI 會取代員工是真的，但這是趨勢。」','「我理解這個擔心。我們的 AI 處理的是重複性的工作，讓員工可以專注在真正需要人的服務——接待客人、處理複雜問題、創造更好的用餐體驗。這是讓員工做更有價值的事，不是取代他們。」','「AI 不會取代員工，您放心。」','「您可以選擇不用 AI。」'],ans:1,explain:'AI 取代員工是常見擔心，正確應對是重新框架——AI 處理重複工作，員工專注高價值服務。這不是取代，而是升級員工的工作品質。',ref:'📞 Sales Playbook > 產品定位'},
{type:'mc',topic:'產品綜合',q:'什麼情況下，你應該同時介紹超過兩個產品給同一個客戶？',opts:['只要客戶有錢就介紹所有產品','當 Discovery 確認客戶有多個不同的痛點，而且每個痛點對應不同的產品時，可以一起介紹，但要說清楚哪個產品解決哪個問題','永遠只介紹一個產品','當 AE 要求你介紹多個產品時'],ans:1,explain:'多個產品不是問題，問題是有沒有對應到真實的痛點。客戶有電話漏接 + LINE 訊息量大 + 想做會員行銷，三個痛點三個產品是合理的。但如果只是想多賣，沒有對應痛點，客戶會覺得被推銷。',ref:'📞 Sales Playbook > 產品定位'},
{type:'mc',topic:'產品綜合',q:'客戶同時有「電話漏接」和「LINE 訊息太多」兩個問題，預算只夠買一個。你會建議他先買哪個？',opts:['永遠先買 LINE AI Call，電話比較重要','永遠先買 AI Chatbot，LINE 訊息量更大','問他哪個問題造成的損失更大，根據他的答案給建議','讓 AE 去決定'],ans:2,explain:'沒有固定答案——如果電話漏接一次就是一桌訂位損失，先買 AI Call；如果 LINE 客服讓員工每天花兩小時，先買 Chatbot。要讓客戶自己算出哪個損失更大，再給建議。',ref:'📞 Sales Playbook > 產品定位'},
{type:'sc',topic:'AI Chatbot',context:'客戶（台中一家義大利麵連鎖，3 家店）問：「AI Chatbot 每家店都要設定一次嗎？還是可以共用？」你不確定技術細節。',q:'你不確定答案，不能亂說。這個時候你應該怎麼做？包含你對客戶說什麼、以及你內部要採取什麼動作。',placeholder:'例如：「這個問題很好，關於多門市的設定方式……」',rubric:['沒有亂給一個不確定的答案','誠實說明需要確認技術細節','告訴客戶你會什麼時候給他準確答案','內部動作是去問 AE 或產品團隊，不是讓客戶自己去問']}
{type:'sc',topic:'LINE AI Call',context:'你在做電話 Discovery，客戶（一家有 120 個座位的婚宴餐廳）說：「我們電話量很大，但主要集中在早上 9 點到 11 點，其他時間很少。這樣 AI Call 有用嗎？」',q:'客戶的使用場景很集中（只有特定時段電話多），他在懷疑 AI Call 是否值得。請說明 AI Call 在這個情況下的具體價值，並引導他算出這段時間漏接的實際影響。',placeholder:'例如：「您說早上 9 到 11 點電話最集中，那我想了解一下……」',rubric:['認可客戶說的情況（集中在特定時段是真的）','說明 AI Call 在那個時段的具體幫助','引導客戶量化漏接的損失（一通訂位代表幾個人消費）','讓客戶自己判斷是否值得，不硬推']},
{type:'sc',topic:'Ocard 串接',context:'你正在介紹 inline，客戶說：「你們說跟 Ocard 串接，但我從來沒聽過 Ocard，感覺很陌生，這是什麼？」',q:'客戶不認識 Ocard，你需要用最簡單的方式說明 Ocard 是什麼、串接對他有什麼好處，同時不要讓他覺得「我還要再了解一個新東西」而增加決策複雜度。',placeholder:'例如：「Ocard 是一個專門做餐廳會員行銷的平台……」',rubric:['用一句話說清楚 Ocard 是什麼（第三方會員行銷平台）','說明 inline 提供免費串接（串接不收費，但 Ocard 本身需要自己申辦）','說明對他的具體好處（更了解消費者）','語氣讓他覺得這是加分，不是增加複雜度']},
];
const AK='';
let cur=0,score=0,answers=[],sel=null;
const MC=QS.filter(q=>q.type==='mc').length,SC=QS.filter(q=>q.type==='sc').length,total=QS.length;
function setProg(){document.getElementById('prog').style.width=(cur/total*100)+'%'}
function render(){setProg();QS[cur].type==='mc'?renderMC():renderSC();}
function renderMC(){const q=QS[cur];const L=['A','B','C','D'];document.getElementById('qb').innerHTML=`<div class="qm"><span class="qb bmc">選擇題</span><span class="qn">${cur+1}/${total}</span><span class="qn" style="margin-left:auto">${q.topic}</span></div><div class="qt">${q.q}</div><div class="opts">${q.opts.map((o,i)=>`<div class="opt" id="o${i}" onclick="pick(${i})"><div class="ol">${L[i]}</div><div class="ot">${o}</div></div>`).join('')}</div><div id="fb"></div><div class="nav"><span id="hint" style="font-size:13px;color:#73726c">選一個答案</span><div class="nr"><button class="btn bp" id="cbtn" onclick="confirm2()" style="display:none">確認答案</button><button class="btn bp" id="nbtn" onclick="nextQ()" style="display:none">${cur===total-1?'看成績':'下一題 →'}</button></div></div>`;sel=null;}
function pick(i){if(document.getElementById('nbtn').style.display!=='none')return;document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));document.getElementById('o'+i).classList.add('sel');sel=i;document.getElementById('cbtn').style.display='inline-block';document.getElementById('hint').textContent='';}
function confirm2(){if(sel===null)return;const q=QS[cur];const ok=sel===q.ans;if(ok)score++;answers.push({idx:cur,type:'mc',correct:ok,q});document.querySelectorAll('.opt').forEach((el,i)=>{if(i===q.ans)el.classList.add('ok');else if(i===sel&&!ok)el.classList.add('no');});document.getElementById('fb').innerHTML=`<div class="fb ${ok?'ok':'no'}">${ok?'<strong>正確</strong>':'<strong>答錯了</strong> — 正確答案是 <strong>'+['A','B','C','D'][q.ans]+'</strong>'}<br>${q.explain}<div class="rf">複習：${q.ref}</div></div>`;document.getElementById('cbtn').style.display='none';document.getElementById('nbtn').style.display='inline-block';}
function renderSC(){const q=QS[cur];document.getElementById('qb').innerHTML=`<div class="qm"><span class="qb bsc">情境題</span><span class="qn">${cur+1}/${total}</span><span class="qn" style="margin-left:auto">${q.topic}</span></div><div class="qctx">${q.context}</div><div class="qt">${q.q}</div><div style="font-size:13px;color:#73726c;margin-bottom:.5rem">你的回應</div><textarea class="sca" id="sca" placeholder="${q.placeholder}" oninput="chk()"></textarea><div style="font-size:12px;color:#73726c;margin-top:.4rem">沒有標準答案，AI 根據評分標準逐項批改</div><div id="fb" style="margin-top:1rem"></div><div class="nav" style="margin-top:1rem"><span></span><div class="nr" id="scnav"><button class="btn bp" id="scbtn" onclick="submitSC()" disabled>AI 批改</button></div></div>`;}
function chk(){const b=document.getElementById('scbtn');if(b)b.disabled=document.getElementById('sca').value.trim().length<10;}
async function submitSC(){const q=QS[cur];const ans=document.getElementById('sca').value.trim();const btn=document.getElementById('scbtn');btn.disabled=true;btn.textContent='批改中…';const prompt=`你是 inline（台灣餐廳 SaaS）SDR 主管，正在批改新人的產品知識練習。\n\nOcard 背景知識：Ocard 是第三方會員行銷平台，inline 提供免費串接（串接本身不收費，但客戶需要自己申辦 Ocard）。本來有在用 Ocard 的店家吸引力更大。\n\n情境：${q.context}\n問題：${q.q}\n學員回答：${ans}\n\n評分標準（每項 1 分）：\n${q.rubric.map((r,i)=>`${i+1}. ${r}`).join('\n')}\n\n請用繁體中文回覆，只輸出 JSON：\n{"score":數字,"total":${q.rubric.length},"passed":[通過編號從1開始],"missed":[未通過編號],"comment":"2-3句評語","suggestion":"30字以內更好話術"}`;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});const data=await res.json();const r=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());const ok=r.score>=Math.ceil(q.rubric.length*0.6);if(ok)score+=0.5;answers.push({idx:cur,type:'sc',correct:ok,result:r,q});document.getElementById('fb').innerHTML=`<div class="fb ${ok?'ok':'no'}"><strong>${ok?'通過':'需要加強'}</strong> — ${r.score}/${r.total} 分<br>${r.comment}<div class="sbox"><strong>更好的說法：</strong>${r.suggestion}</div>${r.passed.length?`<div class="rf">達成：${r.passed.map(i=>q.rubric[i-1]).join('、')}</div>`:''}</div>`;btn.style.display='none';const nb=document.createElement('button');nb.className='btn bp';nb.textContent=cur===total-1?'看成績':'下一題 →';nb.onclick=nextQ;document.getElementById('scnav').appendChild(nb);}catch(e){btn.disabled=false;btn.textContent='AI 批改';document.getElementById('fb').innerHTML='<div class="fb no">批改失敗，請再試一次。</div>';}}
function nextQ(){cur++;cur>=total?showResult():render();}
function showResult(){document.getElementById('prog').style.width='100%';const mcOk=answers.filter(a=>a.type==='mc'&&a.correct).length;const scOk=answers.filter(a=>a.type==='sc'&&a.correct).length;const pct=Math.round((score/(MC+SC*0.5))*100);let grade,gc;if(pct>=85){grade='優秀 — 產品知識紮實';gc='#085041'}else if(pct>=70){grade='良好 — 幾個產品還需加強';gc='#633806'}else{grade='需要加強 — 建議重新複習產品頁面';gc='#791F1F'}const tm={};answers.forEach(a=>{if(!tm[a.q.topic])tm[a.q.topic]={p:0,t:0};tm[a.q.topic].t++;if(a.correct)tm[a.q.topic].p++;});const weak=Object.entries(tm).filter(([,v])=>v.p/v.t<0.6);const refs={TMS:'📦 Product Knowledge > TMS','LINE AI Call':'📦 Product Knowledge > LINE AI Call','AI Chatbot':'📦 Product Knowledge > AI Chatbot','AI EDM':'📦 Product Knowledge > AI EDM','Ocard 串接':'📦 Product Knowledge > Ocard 串接','產品綜合':'📞 Sales Playbook > 產品定位'};const prodList=['TMS','LINE AI Call','AI Chatbot','AI EDM','Ocard 串接'];const statCards=prodList.map(p=>{const d=tm[p]||{p:0,t:0};const col=d.t===0?'#73726c':d.p/d.t>=0.6?'#085041':'#791F1F';return `<div class="sc"><div class="sv" style="color:${col}">${d.t?Math.round(d.p/d.t*100):'-'}<span style="font-size:8px">%</span></div><div class="sl">${p}</div></div>`;}).join('');const rev=answers.map((a,i)=>{const body=a.type==='mc'&&!a.correct?`<div class="rb">${a.q.explain}<br><span style="color:#534AB7;font-size:12px;display:block;margin-top:4px">複習：${a.q.ref}</span></div>`:'';return `<div class="ri"><div class="rh2 ${a.correct?'p':'f'}">${a.correct?'✓':'✗'} Q${i+1} ${a.q.topic}${a.type==='sc'?' 情境':''} — ${a.correct?'正確':'答錯'}</div>${body}</div>`;}).join('');document.getElementById('qb').innerHTML=`<div class="rh"><div class="rs">${pct}<span style="font-size:22px;color:#73726c">分</span></div><div class="rsub">選擇題 ${mcOk}/${MC} ・情境題 ${scOk}/${SC} 通過</div><div class="rg" style="color:${gc}">${grade}</div></div><div class="sl2">各產品正確率</div><div class="sg">${statCards}</div>${weak.length?`<div class="sl2">建議複習</div>${weak.map(([t])=>`<div class="wi"><div class="wt">${t}</div><div class="wd">${refs[t]||t}</div></div>`).join('')}`:'<div style="font-size:14px;color:#085041;background:#E1F5EE;padding:.75rem 1rem;border-radius:10px;margin-bottom:1rem">所有產品主題都通過了！</div>'}<div class="sl2" style="margin-top:1.5rem">每題回顧</div>${rev}<div style="margin-top:1.5rem"><button class="btn" onclick="restart()">↺ 重新考一次</button></div>`;}
function restart(){cur=0;score=0;answers=[];sel=null;render();}
render();
</script>
</body>
</html>
