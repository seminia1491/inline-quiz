<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>inline SDR 開發流程測驗 A2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f5f5f3;min-height:100vh;padding:2rem 1rem;color:#1a1a18}
.container{max-width:680px;margin:0 auto}
.header{text-align:center;margin-bottom:2rem}
.header h1{font-size:22px;font-weight:500;margin-bottom:.4rem}
.header p{font-size:14px;color:#73726c}
.card{background:#fff;border-radius:16px;border:0.5px solid rgba(0,0,0,0.1);padding:1.75rem}
.pb{height:4px;background:#e8e6df;border-radius:2px;margin-bottom:1.5rem}
.pf{height:4px;background:#1D9E75;border-radius:2px;transition:width .4s}
.qm{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.qb{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}
.bmc{background:#E1F5EE;color:#0F6E56}
.bsc{background:#EEEDFE;color:#534AB7}
.qn{font-size:13px;color:#73726c}
.qt{font-size:16px;font-weight:500;line-height:1.55;margin-bottom:1.25rem}
.qctx{font-size:13px;color:#5f5e5a;background:#f5f5f3;border-left:3px solid #1D9E75;padding:.75rem 1rem;border-radius:0 8px 8px 0;margin-bottom:1.25rem;line-height:1.6}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.opt{display:flex;align-items:flex-start;gap:10px;padding:.75rem 1rem;border:0.5px solid rgba(0,0,0,0.12);border-radius:10px;cursor:pointer;background:#fff;transition:background .15s}
.opt:hover{background:#f5f5f3}
.opt.sel{border-color:#1D9E75;background:#E1F5EE}
.opt.ok{border-color:#1D9E75;background:#E1F5EE;cursor:default}
.opt.no{border-color:#E24B4A;background:#FCEBEB;cursor:default}
.opt.ok .ol{background:#1D9E75;color:#fff;border-color:#1D9E75}
.opt.no .ol{background:#E24B4A;color:#fff;border-color:#E24B4A}
.opt.sel .ol{background:#1D9E75;color:#fff;border-color:#1D9E75}
.ol{min-width:26px;height:26px;border-radius:50%;border:0.5px solid rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#73726c;flex-shrink:0;margin-top:1px}
.ot{font-size:14px;line-height:1.5}
.btn{padding:.6rem 1.25rem;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;color:#1a1a18}
.btn:hover{background:#f5f5f3}
.bp{background:#1D9E75;border-color:#1D9E75;color:#fff}
.bp:hover{background:#0F6E56}
.btn:disabled{opacity:.4;cursor:not-allowed}
.fb{padding:1rem;border-radius:10px;margin-bottom:1rem;font-size:14px;line-height:1.6}
.fb.ok{background:#E1F5EE;border:0.5px solid #5DCAA5;color:#085041}
.fb.no{background:#FCEBEB;border:0.5px solid #F09595;color:#791F1F}
.rf{margin-top:.5rem;font-size:12px;opacity:.8}
.sca{width:100%;padding:.75rem 1rem;border:0.5px solid rgba(0,0,0,0.12);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:90px;color:#1a1a18}
.sca:focus{outline:none;border-color:#1D9E75}
.rh{text-align:center;background:#f5f5f3;border-radius:12px;padding:1.5rem;margin-bottom:1.25rem}
.rs{font-size:50px;font-weight:500}
.rsub{font-size:14px;color:#73726c;margin-top:.2rem}
.rg{font-size:17px;font-weight:500;margin:.75rem 0 0}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.sc{background:#f5f5f3;border-radius:8px;padding:.75rem;text-align:center}
.sv{font-size:22px;font-weight:500}
.sl{font-size:11px;color:#73726c;margin-top:2px}
.wi{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:.75rem 1rem;margin-bottom:.5rem}
.wt{font-size:14px;font-weight:500;margin-bottom:2px}
.wd{font-size:12px;color:#73726c}
.ri{border:0.5px solid rgba(0,0,0,0.1);border-radius:10px;overflow:hidden;margin-bottom:.6rem}
.rh2{padding:.65rem 1rem;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.rh2.p{background:#E1F5EE;color:#085041}
.rh2.f{background:#FCEBEB;color:#791F1F}
.rb{padding:.75rem 1rem;font-size:13px;color:#5f5e5a;line-height:1.6;border-top:0.5px solid rgba(0,0,0,0.08)}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem}
.nr{display:flex;gap:8px}
.sl2{font-size:11px;font-weight:500;color:#73726c;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;margin-top:1.25rem}
.sbox{margin-top:.5rem;padding:.5rem .75rem;background:rgba(0,0,0,.04);border-radius:8px;font-size:13px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>SDR 開發流程測驗 — A2</h1>
    <p>20 題・選擇題 18 + 情境題 2・全新題目不重複</p>
  </div>
  <div class="card">
    <div class="pb"><div class="pf" id="prog" style="width:0%"></div></div>
    <div id="qb"></div>
  </div>
</div>
<script>
const QS=[
{type:'mc',topic:'Cold Call',q:'版本 B「引用型」開場白的核心技巧是什麼？',opts:['背出完整的產品功能清單','用對方店家的具體資訊（如 Google Maps 評分、餐廳類型）建立相關性','先報出公司的市場佔有率','說出你今天打了幾通電話'],ans:1,explain:'引用型開場白的力量在於「我知道你是誰」——用對方的具體資訊（評分好、客人多）建立相關性，讓對方覺得你不是亂槍打鳥，而是針對他而來。',ref:'📞 Sales Playbook > Cold Call 腳本 > 版本 B'},
{type:'mc',topic:'Cold Call',q:'你打電話，對方說「我正在吃飯，你晚點打來。」你應該？',opts:['說「好」然後隨機找個時間再打','「沒問題，請問您大概幾點方便？我準時打過來。」確認具體時間','說「我很快，就說一分鐘」強行繼續','記錄「用餐中」然後隔三天再試'],ans:1,explain:'對方給你機會再打，這是好訊號。一定要確認具體時間，讓自己的回撥變成「說好的電話」而不是「又一通推銷電話」。',ref:'📞 Sales Playbook > Cold Call > 常見卡關應對'},
{type:'mc',topic:'Cold Call',q:'你在打電話前，應該先查哪些關於這家餐廳的資訊？',opts:['股東名單和財務報表','餐廳類型、有沒有 LINE 官帳、Google Maps 評分和評論數量','老闆的個人 Instagram','競品業務有沒有去拜訪過'],ans:1,explain:'打電話前的基本功課：餐廳類型（判斷 ICP）、有無 LINE 官帳（產品適配）、評分和評論量（判斷訂位需求強度）。有這些資訊才能做引用型開場。',ref:'📞 Sales Playbook > Cold Call 腳本'},
{type:'mc',topic:'Cold Call',q:'「版本 C 問句型」開場白最適合什麼情況？',opts:['你非常熟悉這家餐廳的狀況','你不確定接電話的人是不是老闆或決策者','你已經打過這家餐廳兩次了','你想快速結束通話'],ans:1,explain:'問句型開場「請問是負責餐廳營運的嗎？」在不確定對方身份時最有效，讓對方先確認身份，你再決定怎麼繼續。',ref:'📞 Sales Playbook > Cold Call 腳本 > 版本 C'},
{type:'mc',topic:'Discovery',q:'「P（痛點）問題」和「I（影響）問題」有什麼根本差異？',opts:['P 問有沒有問題，I 問問題有多嚴重、造成什麼代價','P 是開放題，I 是是非題','P 用在 Discovery 前段，I 用在結尾','沒有差異，可以互換'],ans:0,explain:'P 問題挖出問題存在（「有沒有漏接電話？」），I 問題讓客戶算出代價（「漏接一個月影響多少桌生意？」）。I 讓問題從「有點麻煩」升級到「這是真的在損失錢」。',ref:'📞 Sales Playbook > Discovery > SPIN'},
{type:'mc',topic:'Discovery',q:'你問了五個 S（現況）問題，客戶一直在回答，但你還沒問到任何痛點。這時候應該？',opts:['繼續問更多 S 問題，了解越多越好','轉到 P 問題：「您剛說每天有很多電話，有沒有遇過接不過來的狀況？」','開始介紹產品','說「那您有沒有考慮過我們的 AI Call？」'],ans:1,explain:'S 問題是收集事實，不是終點。聽到對方說了某個狀況（很多電話），就可以用這個切入轉到 P 問題。Discovery 要有節奏，S → P → I → N。',ref:'📞 Sales Playbook > Discovery > SPIN'},
{type:'mc',topic:'Discovery',q:'客戶在 Discovery 中說「我現在用 Google 表單管訂位」，你接下來應該問什麼？',opts:['「Google 表單很好用啊，你還需要什麼嗎？」','「了解，用 Google 表單的話，客人填完之後你怎麼確認？有沒有遇過填了但沒收到通知的狀況？」','「Google 表單不夠專業，你應該換系統。」','「哦，那你有考慮過我們的 TMS 嗎？」'],ans:1,explain:'客戶說了現況（Google 表單），你要挖潛在痛點：確認流程有沒有漏洞？通知有沒有問題？這樣自然帶出 TMS 的切入點，而不是直接推產品。',ref:'📞 Sales Playbook > Discovery'},
{type:'mc',topic:'Discovery',q:'Discovery 完成後，進入產品介紹前，你應該做什麼確認動作？',opts:['直接開始介紹所有產品','先總結你聽到的痛點，讓客戶確認：「所以您最想改善的是 XX，對嗎？」','問客戶願不願意試用','把 Meeting 約起來再說'],ans:1,explain:'總結確認是 Discovery 結束最重要的動作——讓客戶自己說「對，就是這個問題」，然後你再提解法。客戶認可的痛點比你說的更有力量。',ref:'📞 Sales Playbook > Discovery'},
{type:'mc',topic:'異議處理',q:'客戶說「我的客人年紀比較大，不習慣用 LINE，你這些對我沒用」，這是哪種異議？',opts:['價格異議','需求異議（對產品適用性有疑慮）','決策異議','時機異議'],ans:1,explain:'這是需求異議的變體——客戶不認為產品適合他的客群。應對方式是先釐清誤解（LINE AI Call 是餐廳用，不是客人用），再重新定位價值。',ref:'🚫 Objection Handling > Chapter 1'},
{type:'mc',topic:'異議處理',q:'客戶說完「再想想」後掛電話了。下次跟進時，你第一句應該說什麼？',opts:['「您想好了嗎？」','「上次您說再想想，我想了解一下，主要是哪個部分還有疑慮？」','「我們有新的優惠，所以打來跟您說。」','「上次忘記問您，您有在用哪個系統嗎？」'],ans:1,explain:'跟進電話要直接切入「上次留下來的問題」，不要假裝沒發生過。問出具體疑慮，才能針對處理，而不是再走一遍 Discovery。',ref:'🚫 Objection Handling > Chapter 5'},
{type:'mc',topic:'異議處理',q:'客戶說「你們的系統萬一壞掉怎麼辦？」這背後真正的擔心是？',opts:['他認為你們技術能力很差','他擔心系統不穩定會影響營運，是導入風險的顧慮','他在測試你的技術知識','他只是隨便說說'],ans:1,explain:'「系統壞掉」是對穩定性和服務支援的擔心，本質是導入風險。應對方式是說明 SLA、客服支援、有問題怎麼處理，而不是保證「不會壞」。',ref:'🚫 Objection Handling > Chapter 4'},
{type:'mc',topic:'異議處理',q:'你用 Feel/Felt/Found 處理完異議，客戶說「嗯，好像有道理。」下一步應該？',opts:['繼續說更多 Found 案例，加強說服力','趁勢問一個推進的問題，例如「那我們可以安排時間讓您看一下實際操作嗎？」','說「那你決定了嗎？」','再說一次整個框架確認對方理解'],ans:1,explain:'客戶的「嗯，有道理」是推進訊號。這時候要馬上問下一步，不要繼續說更多說服的話，說多了反而給對方找新疑慮的機會。',ref:'🚫 Objection Handling > 核心框架'},
{type:'mc',topic:'競品應對',q:'客戶說「我有在用 Oddle 管外送」，你應該怎麼回應？',opts:['說「Oddle 很不好，你應該換掉」','「Oddle 在外送整合這塊很專業。我想了解一下，除了外送，您內用的訂位和客服這塊是怎麼處理的？」','「我們也可以做外送整合。」','「Oddle 和我們是一樣的東西。」'],ans:1,explain:'Oddle 專注外送，inline 做內用前端流程，兩者不衝突。認可 Oddle 的強項，再找出我們補的缺口——內用訂位和客服這條線。',ref:'🆚 Competitor > vs Oddle'},
{type:'mc',topic:'競品應對',q:'客戶說「我已經在所有外送平台上了，不需要了」，你應該？',opts:['說「好，那再見」','說「外送平台帶的是新客，我們做的是讓這些客人變成你的老客、回頭客。這兩件事是不同的，可以聊一下嗎？」','說「我們比外送平台便宜」','說「外送平台其實很貴，你知道嗎？」'],ans:1,explain:'外送平台 ≠ 我們。外送平台是導流，我們做的是直客管理和會員經營。這是定位對比，不是競爭關係。',ref:'🆚 Competitor'},
{type:'mc',topic:'資格篩選',q:'一家餐廳老闆說「我有三家店，但全部都是外帶，沒有內用」，這個 lead 應該怎麼處理？',opts:['繼續跟進，連鎖店有很多機會','標記為不適合，外帶店沒有我們解決的核心問題（訂位、桌況）','推 AI EDM，只賣他 EDM 功能','問老闆有沒有計畫開內用店'],ans:1,explain:'外帶店的核心問題不是訂位管理，TMS 和 AI Call 都派不上用場。EDM 雖然可以做，但整體 fit 不高。標記為不適合，把時間花在更符合 ICP 的 lead 上。',ref:'📞 Sales Playbook > 資格篩選'},
{type:'mc',topic:'資格篩選',q:'Discovery 完成後，你不確定對方有沒有預算意識，最好的做法是？',opts:['直接問「你們一個月可以花多少錢在這上面？」','問「如果這個問題可以解決，您覺得這種工具大概值多少錢？」或「您有沒有在評估這塊的預算？」','假設對方有預算，繼續往下走','說「我們有各種方案，一定有適合您的」'],ans:1,explain:'直接問預算數字太突兀。用間接問法讓對方說出他的預算認知，或問他有沒有在評估這塊，都是更自然的方式。',ref:'📞 Sales Playbook > 資格篩選'},
{type:'mc',topic:'SOP',q:'你今天的目標是撥出 80 通電話。到下午 3 點，你打了 30 通，接通率只有 10%。你應該？',opts:['放棄今天的目標，明天補','檢視今天的時段分布，剩餘時間集中在 14:30–17:30 高接通率時段，並調整開場白','繼續同樣的方式打，相信量能補質','打給最容易接通的 lead，先衝數字'],ans:1,explain:'接通率低通常是時段或開場白的問題。下午 14:30–17:30 是高接通率時段，這時候集中火力；同時反省開場白有沒有問題。數字重要，但質更重要。',ref:'⚙️ SOP > 每日流程'}},
{type:'sc',topic:'資格篩選',context:'你打給高雄一家燒肉店，老闆說「我有興趣，但我兒子在管餐廳，你要跟他談。」你問兒子有沒有決策權，老闆說「大部分他決定，但大筆費用還是要我點頭。」',q:'這是典型的雙決策者情境。你接下來要怎麼跟進？目標是同時讓兒子推進、又不繞過老闆。請說明你的策略和具體動作。',placeholder:'例如：「好的，我可以先跟您兒子說明……」',rubric:['不是跳過老闆直接找兒子','不是只依賴老闆讓兒子自己去了解','說明如何讓兒子成為內部推手（幫他準備說明資料）','說明何時要讓老闆重新介入（例如到了要做決定的時候）']}
{type:'sc',topic:'Discovery',context:'你打給一家台中的火鍋連鎖（有 4 個分店），老闆接電話，你完成開場後，他說「你說說看吧，不過我們現在都有在用系統了。」',q:'客戶有現有系統，但願意聽。你要繼續 Discovery，了解現有系統是什麼、有沒有缺口。請打出你接下來的 2–3 句話術。',placeholder:'例如：「好的，請問您現在用的是哪個系統？主要是管哪個環節？」',rubric:['問出對方現在用什麼系統','問出主要用哪個功能或環節','沒有說現有系統不好','語氣像在了解，不像在找問題攻擊']},
{type:'sc',topic:'競品應對',context:'你在做 Discovery，客戶說：「我之前有業務來推薦 Menu+，說可以讓客人用 QR Code 點餐，感覺蠻方便的，我還在考慮。」',q:'客戶正在評估 Menu+，你需要做定位對比，找出 inline 和 Menu+ 解決的不同問題，不攻擊競品。請打出完整回應。',placeholder:'例如：「Menu+ 在 QR Code 點餐這塊確實……」',rubric:['認可 Menu+ 在點餐這塊的優點','說明 inline 解決的是訂位流程和 AI 客服，不是點餐','問到客戶目前訂位或客服有沒有遇到問題','結尾有引導繼續 Discovery 的問題']},
];
const AK='';
let cur=0,score=0,answers=[],sel=null;
const MC=QS.filter(q=>q.type==='mc').length,SC=QS.filter(q=>q.type==='sc').length,total=QS.length;
function setProg(){document.getElementById('prog').style.width=(cur/total*100)+'%'}
function render(){setProg();QS[cur].type==='mc'?renderMC():renderSC();}
function renderMC(){const q=QS[cur];const L=['A','B','C','D'];document.getElementById('qb').innerHTML=`<div class="qm"><span class="qb bmc">選擇題</span><span class="qn">${cur+1}/${total}</span><span class="qn" style="margin-left:auto">${q.topic}</span></div><div class="qt">${q.q}</div><div class="opts">${q.opts.map((o,i)=>`<div class="opt" id="o${i}" onclick="pick(${i})"><div class="ol">${L[i]}</div><div class="ot">${o}</div></div>`).join('')}</div><div id="fb"></div><div class="nav"><span id="hint" style="font-size:13px;color:#73726c">選一個答案</span><div class="nr"><button class="btn bp" id="cbtn" onclick="confirm2()" style="display:none">確認答案</button><button class="btn bp" id="nbtn" onclick="nextQ()" style="display:none">${cur===total-1?'看成績':'下一題 →'}</button></div></div>`;sel=null;}
function pick(i){if(document.getElementById('nbtn').style.display!=='none')return;document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));document.getElementById('o'+i).classList.add('sel');sel=i;document.getElementById('cbtn').style.display='inline-block';document.getElementById('hint').textContent='';}
function confirm2(){if(sel===null)return;const q=QS[cur];const ok=sel===q.ans;if(ok)score++;answers.push({idx:cur,type:'mc',correct:ok,q});document.querySelectorAll('.opt').forEach((el,i)=>{if(i===q.ans)el.classList.add('ok');else if(i===sel&&!ok)el.classList.add('no');});document.getElementById('fb').innerHTML=`<div class="fb ${ok?'ok':'no'}">${ok?'<strong>正確</strong>':'<strong>答錯了</strong> — 正確答案是 <strong>'+['A','B','C','D'][q.ans]+'</strong>'}<br>${q.explain}<div class="rf">複習：${q.ref}</div></div>`;document.getElementById('cbtn').style.display='none';document.getElementById('nbtn').style.display='inline-block';}
function renderSC(){const q=QS[cur];document.getElementById('qb').innerHTML=`<div class="qm"><span class="qb bsc">情境題</span><span class="qn">${cur+1}/${total}</span><span class="qn" style="margin-left:auto">${q.topic}</span></div><div class="qctx">${q.context}</div><div class="qt">${q.q}</div><div style="font-size:13px;color:#73726c;margin-bottom:.5rem">你的回應</div><textarea class="sca" id="sca" placeholder="${q.placeholder}" oninput="chk()"></textarea><div style="font-size:12px;color:#73726c;margin-top:.4rem">沒有標準答案，AI 根據評分標準逐項批改</div><div id="fb" style="margin-top:1rem"></div><div class="nav" style="margin-top:1rem"><span></span><div class="nr" id="scnav"><button class="btn bp" id="scbtn" onclick="submitSC()" disabled>AI 批改</button></div></div>`;}
function chk(){const b=document.getElementById('scbtn');if(b)b.disabled=document.getElementById('sca').value.trim().length<10;}
async function submitSC(){const q=QS[cur];const ans=document.getElementById('sca').value.trim();const btn=document.getElementById('scbtn');btn.disabled=true;btn.textContent='批改中…';const prompt=`你是 inline（台灣餐廳 SaaS）SDR 主管，正在批改新人話術練習。\n\n情境：${q.context}\n問題：${q.q}\n學員回答：${ans}\n\n評分標準（每項 1 分）：\n${q.rubric.map((r,i)=>`${i+1}. ${r}`).join('\n')}\n\n請用繁體中文回覆，只輸出 JSON：\n{"score":數字,"total":${q.rubric.length},"passed":[通過編號從1開始],"missed":[未通過編號],"comment":"2-3句評語","suggestion":"30字以內更好話術"}`;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});const data=await res.json();const r=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());const ok=r.score>=Math.ceil(q.rubric.length*0.6);if(ok)score+=0.5;answers.push({idx:cur,type:'sc',correct:ok,result:r,q});document.getElementById('fb').innerHTML=`<div class="fb ${ok?'ok':'no'}"><strong>${ok?'通過':'需要加強'}</strong> — ${r.score}/${r.total} 分<br>${r.comment}<div class="sbox"><strong>更好的說法：</strong>${r.suggestion}</div>${r.passed.length?`<div class="rf">達成：${r.passed.map(i=>q.rubric[i-1]).join('、')}</div>`:''}</div>`;btn.style.display='none';const nb=document.createElement('button');nb.className='btn bp';nb.textContent=cur===total-1?'看成績':'下一題 →';nb.onclick=nextQ;document.getElementById('scnav').appendChild(nb);}catch(e){btn.disabled=false;btn.textContent='AI 批改';document.getElementById('fb').innerHTML='<div class="fb no">批改失敗，請再試一次。</div>';}}
function nextQ(){cur++;cur>=total?showResult():render();}
function showResult(){document.getElementById('prog').style.width='100%';const mcOk=answers.filter(a=>a.type==='mc'&&a.correct).length;const scOk=answers.filter(a=>a.type==='sc'&&a.correct).length;const pct=Math.round((score/(MC+SC*0.5))*100);let grade,gc;if(pct>=85){grade='優秀 — 可以獨立作業';gc='#085041'}else if(pct>=70){grade='良好 — 還有幾個環節要加強';gc='#633806'}else{grade='需要加強 — 建議重新複習弱項';gc='#791F1F'}const tm={};answers.forEach(a=>{if(!tm[a.q.topic])tm[a.q.topic]={p:0,t:0};tm[a.q.topic].t++;if(a.correct)tm[a.q.topic].p++;});const weak=Object.entries(tm).filter(([,v])=>v.p/v.t<0.6);const refs={'Cold Call':'📞 Sales Playbook > Cold Call','Discovery':'📞 Sales Playbook > Discovery','異議處理':'🚫 Objection Handling','競品應對':'🆚 Competitor','資格篩選':'📞 Sales Playbook > 資格篩選','SOP':'⚙️ SOP'};const rev=answers.map((a,i)=>{const body=a.type==='mc'&&!a.correct?`<div class="rb">${a.q.explain}<br><span style="color:#1D9E75;font-size:12px;display:block;margin-top:4px">複習：${a.q.ref}</span></div>`:'';return `<div class="ri"><div class="rh2 ${a.correct?'p':'f'}">${a.correct?'✓':'✗'} Q${i+1} ${a.q.topic}${a.type==='sc'?' 情境':''} — ${a.correct?'正確':'答錯'}</div>${body}</div>`;}).join('');document.getElementById('qb').innerHTML=`<div class="rh"><div class="rs">${pct}<span style="font-size:22px;color:#73726c">分</span></div><div class="rsub">選擇題 ${mcOk}/${MC} ・情境題 ${scOk}/${SC} 通過</div><div class="rg" style="color:${gc}">${grade}</div></div><div class="sg"><div class="sc"><div class="sv">${mcOk}/${MC}</div><div class="sl">選擇題</div></div><div class="sc"><div class="sv">${scOk}/${SC}</div><div class="sl">情境題</div></div><div class="sc"><div class="sv">${Object.keys(tm).length-weak.length}/${Object.keys(tm).length}</div><div class="sl">主題通過</div></div></div>${weak.length?`<div class="sl2">建議複習</div>${weak.map(([t])=>`<div class="wi"><div class="wt">${t}</div><div class="wd">${refs[t]||t}</div></div>`).join('')}`:'<div style="font-size:14px;color:#085041;background:#E1F5EE;padding:.75rem 1rem;border-radius:10px;margin-bottom:1rem">所有主題都通過了！</div>'}<div class="sl2" style="margin-top:1.5rem">每題回顧</div>${rev}<div style="margin-top:1.5rem"><button class="btn" onclick="restart()">↺ 重新考一次</button></div>`;}
function restart(){cur=0;score=0;answers=[];sel=null;render();}
render();
</script>
</body>
</html>
