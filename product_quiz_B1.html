.wi{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:.75rem 1rem;margin-bottom:.5rem}.wt{font-size:14px;font-weight:500;margin-bottom:2px}.wd{font-size:12px;color:#73726c}
.ri{border:0.5px solid rgba(0,0,0,0.1);border-radius:10px;overflow:hidden;margin-bottom:.6rem}
.rh2{padding:.65rem 1rem;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.rh2.p{background:#E1F5EE;color:#085041}.rh2.f{background:#FCEBEB;color:#791F1F}
.rb{padding:.75rem 1rem;font-size:13px;color:#5f5e5a;line-height:1.6;border-top:0.5px solid rgba(0,0,0,0.08)}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem}.nr{display:flex;gap:8px}
.sl2{font-size:11px;font-weight:500;color:#73726c;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;margin-top:1.25rem}

  <div class="header"><h1>產品知識測驗 — B1</h1><p>20 題・TMS / AI Call / Chatbot / EDM / Ocard 串接・全新題目</p></div>

<script>
const QS=[
{type:'mc',topic:'TMS',q:'TMS 的「候位管理」功能主要解決什麼問題？',opts:['讓客人在網路上預訂座位','尖峰時段客人現場等位，系統自動通知叫號，減少現場混亂和員工口頭叫號的負擔','幫餐廳管理員工排班','讓外送訂單自動分配到廚房'],ans:1,explain:'候位管理是 TMS 的核心功能之一——客人現場登記等位，系統自動管理順序，時間到了自動通知，減少員工反覆叫號的負擔和客人不知道等多久的焦慮感。',ref:'📦 Product Knowledge > TMS'},
{type:'mc',topic:'TMS',q:'一家餐廳說「我們用 LINE 管訂位，客人傳 LINE 我們就回」，TMS 可以解決他們哪個問題？',opts:['讓客人不用 LINE 了','把所有 LINE 訂位訊息整合到一個系統，統一管理桌況，避免用 LINE 管訂位容易漏單或衝突的問題','幫他們自動回覆 LINE','讓他們不用管桌位'],ans:1,explain:'用 LINE 管訂位的餐廳常有的問題是：多個人在回 LINE、容易重複訂位、沒有統一的桌況視圖。TMS 把訂位整合進來，統一管理，避免這些問題。',ref:'📦 Product Knowledge > TMS'},
{type:'mc',topic:'TMS',q:'客戶問「TMS 可以讓客人自己在網路上訂位嗎？」正確的回答是？',opts:['不行，TMS 只管現場桌況','可以，TMS 包含線上訂位功能，客人可以從網頁或 LINE 直接訂位，訂位資訊自動進入系統','可以，但要另外加購','不行，要配合其他系統才做得到'],ans:1,explain:'TMS 包含線上訂位功能，客人可以從餐廳網頁或 LINE 官帳直接預訂，訂位資訊自動進入 TMS 桌況管理，不需要人工再輸入一次。',ref:'📦 Product Knowledge > TMS'},
{type:'mc',topic:'LINE AI Call',q:'餐廳老闆說「我們晚餐時段電話特別多，員工根本接不完。」LINE AI Call 如何具體幫到他？',opts:['讓員工可以不用接電話','在員工沒辦法接電話的時候，AI 自動接聽，把客人說的話（如訂位時間、人數）整理成文字，員工有空再確認','讓客人自己在 LINE 上預訂，不需要打電話','讓員工只需要管外送訂單'],ans:1,explain:'LINE AI Call 的核心場景正是這個——晚餐尖峰時段員工忙，電話進來沒人接，AI 幫忙接聽並整理內容。員工服務完客人後再看 AI 整理的訊息，決定是否回覆確認。',ref:'📦 Product Knowledge > LINE AI Call'},
{type:'mc',topic:'LINE AI Call',q:'LINE AI Call 的「AI 接聽」是在哪個端點發生的？',opts:['在客人的手機端，客人說話後 AI 直接回覆','在餐廳端：電話打進來，AI 在餐廳這端接聽，整理訊息後通知餐廳的 LINE','在雲端伺服器，完全不需要 LINE','在客人說話的地方，轉成文字後再傳給餐廳'],ans:1,explain:'客人打電話的方式完全不變，AI 是在餐廳端接聽——也就是當餐廳沒有人接電話時，AI 啟動，把客人說的話整理成文字，推送到餐廳的 LINE 官帳通知。',ref:'📦 Product Knowledge > LINE AI Call'},
{type:'mc',topic:'LINE AI Call',q:'客戶說「我已經有請一個工讀生專門接電話，不需要 AI。」你怎麼回應？',opts:['「那您真的不需要了。」','「了解，請問工讀生是全天都在嗎？還是有時間不在的時候，例如用餐時間或他自己的休息時間？」','「AI 比工讀生便宜。」','「工讀生會請假，AI 不會。」'],ans:1,explain:'有工讀生不等於沒有漏接盲區。最好的切入是問「全天都在嗎？」——工讀生吃飯、休息、甚至離職的時候都是空白。AI 是補工讀生不在的時候，不是取代。',ref:'📦 Product Knowledge > LINE AI Call'},
{type:'mc',topic:'AI Chatbot',q:'AI Chatbot 最適合處理哪種類型的客服訊息？',opts:['「我訂的位子想換人」（需要判斷桌況）','「請問你們幾點開門？有沒有包廂？菜單在哪裡？」（重複性問題）','「我上次吃到不新鮮，我要投訴」（情緒性問題）','「我是媒體，想採訪老闆」（特殊需求）'],ans:1,explain:'AI Chatbot 最擅長的是重複性的標準問題——開門時間、菜單、包廂、停車場等。這類問題讓員工重複回答非常浪費時間，AI 可以全天候即時回覆，準確率高。',ref:'📦 Product Knowledge > AI Chatbot'},
{type:'mc',topic:'AI Chatbot',q:'客戶擔心「如果客人問很複雜的問題，AI 回答錯了怎麼辦？」正確的說明是？',opts:['「AI 不會回答錯。」','「AI 只回答你設定好的標準問題，超出範圍的問題會自動轉接給員工，不會亂回。」','「那就不要用 AI Chatbot。」','「客人問錯誤的答案是很少發生的。」'],ans:1,explain:'AI Chatbot 的回答是基於餐廳自己設定的知識庫，不是亂生成答案。超出設定範圍的問題會轉給員工處理，不會憑空回覆，這是客戶最常擔心的誤解。',ref:'📦 Product Knowledge > AI Chatbot'},
{type:'mc',topic:'AI EDM',q:'AI EDM 的「分群發送」功能，對餐廳最大的實際價值是什麼？',opts:['讓你可以發更多封 Email','根據客人的消費習慣、頻率把他們分群，針對不同群發送最相關的內容，提高開信率和回客率','讓 Email 設計更漂亮','讓你不用寫任何 Email 文案'],ans:1,explain:'分群發送是 EDM 最關鍵的功能——對常來的 VIP 發「謝謝您的支持」、對三個月沒來的客人發「好久不見優惠」，不同群收到不同內容，才能真正提高轉換。',ref:'📦 Product Knowledge > AI EDM'},
{type:'mc',topic:'AI EDM',q:'客戶說「我已經有用 Mailchimp 了，你們的 AI EDM 有什麼不同？」正確應對是？',opts:['「Mailchimp 不好，你換掉比較好」','「Mailchimp 是很成熟的工具。我想了解一下，您現在用 Mailchimp 是自己寫文案，還是有專人負責？因為我們的 AI EDM 最大的差異是 AI 幫你生成針對餐廳的行銷文案，不需要自己寫。」','「我們的功能跟 Mailchimp 一樣，但比較便宜。」','「那您不需要我們了。」'],ans:1,explain:'不攻擊 Mailchimp，找差異化：AI 生成文案（不需要行銷背景）+ 針對餐廳場景優化（不是通用行銷工具）。問他現在怎麼寫文案，才能點出我們的實際價值。',ref:'📦 Product Knowledge > AI EDM'},
{type:'mc',topic:'AI EDM',q:'一家餐廳說「我們完全沒有在做會員或 Email 行銷」，是否適合立刻推 AI EDM？',opts:['適合，越早開始越好','不適合立刻推，因為 AI EDM 需要有基礎的會員資料。應該先了解他們有沒有任何客人聯絡方式，再決定從哪個產品切入','適合，AI 可以幫他從零建立','不適合，這種客戶不是我們的 ICP'],ans:1,explain:'AI EDM 的前提是有客人資料（Email、電話）。完全沒有任何客人資料的餐廳，AI EDM 無從發揮。應該先問他有沒有任何聯絡方式，評估從哪個地方先累積資料。',ref:'📦 Product Knowledge > AI EDM'},
{type:'mc',topic:'Ocard 串接',q:'對一家完全沒有用過 Ocard 的餐廳，如何介紹 inline 和 Ocard 串接的價值？',opts:['說「你要先去辦 Ocard 再用我們」','說「我們跟 Ocard 有串接，如果你後來有用 Ocard，你的 inline 訂位資料和消費行為可以直接連過去，讓你更完整地了解你的客人」','說「Ocard 不重要，先用我們就好」','說「這個功能不重要，跳過」'],ans:1,explain:'對沒用過 Ocard 的餐廳，串接是一個未來的加值選項——先用 inline 沒問題，如果日後有需要會員行銷工具，可以接 Ocard，而且兩邊資料可以打通。這降低了進入門檻。',ref:'📦 Product Knowledge > Ocard 串接'},
{type:'mc',topic:'Ocard 串接',q:'客戶說「Ocard 說他們自己也有訂位功能，為什麼還要用 inline？」你應該怎麼回應？',opts:['「Ocard 的訂位功能比我們差」','「Ocard 的訂位是他們的附加功能，我們是專注在訂位管理的系統，功能更完整。而且兩個串接後，你的訂位資料和會員資料可以打通，讓你更了解客人。」','「那你選 Ocard 就好了」','「這個我不清楚，你去問 Ocard」'],ans:1,explain:'不攻擊 Ocard，做定位對比：inline 是訂位管理的專業系統，功能更完整；Ocard 強在會員行銷。兩個串接後資料打通，互補而非競爭。',ref:'📦 Product Knowledge > Ocard 串接'},
{type:'mc',topic:'產品綜合',q:'客戶說「我想做老客人的維繫，讓他們多回來消費。」最應該推哪個組合？',opts:['TMS + LINE AI Call','AI EDM + Ocard 串接','AI Chatbot + TMS','LINE AI Call + AI Chatbot'],ans:1,explain:'老客人維繫 → AI EDM（主動 Email 行銷召回）+ Ocard 串接（更完整掌握消費者，精準行銷）。這兩個搭配解決的正是「讓老客人回來」這個需求。',ref:'📞 Sales Playbook > 產品定位'},
{type:'mc',topic:'產品綜合',q:'一家餐廳老闆說「我每一樣都想要，從哪個開始比較好？」你應該怎麼引導？',opts:['說「全部買，一次解決」','先問「您目前最大的痛點是什麼？」根據最迫切的問題推薦優先導入的產品','說「先買 TMS 吧，它最重要」','說「這要看你的預算」'],ans:1,explain:'「全部都想要」說明客戶有全面需求，但不代表要全部一起導入。問最迫切的問題，先解決最痛的點，讓客戶看到效果後再擴展，成功率更高。',ref:'📞 Sales Playbook > 產品定位'},
{type:'mc',topic:'產品綜合',q:'下列哪個產品組合最適合一家有強烈訂位需求、LINE 客服訊息量大、但還沒有做會員行銷的中型餐廳？',opts:['只買 AI EDM','TMS + AI Chatbot（先解決訂位和客服，等會員資料累積後再加 EDM）','只買 Ocard 串接','LINE AI Call + AI EDM'],ans:1,explain:'有訂位需求 → TMS；LINE 客服量大 → AI Chatbot。會員行銷需要先有資料，用 TMS 累積訂位客人資料，之後才能做有效的 EDM。導入順序很重要。',ref:'📞 Sales Playbook > 產品定位'},
{type:'mc',topic:'產品綜合',q:'客戶問「如果我只有預算買一個，你推薦哪個？」你應該怎麼回應？',opts:['直接說「買 TMS，它最重要」','「這個問題我需要先了解您目前最大的痛點是什麼，才能給您最準確的建議。您目前最頭痛的是哪一塊？」','說「預算不夠就算了」','說「每個都一樣重要，沒辦法選」'],ans:1,explain:'不同餐廳最大的痛點不同。電話漏接最痛 → AI Call；客服量大 → Chatbot；桌況混亂 → TMS。問清楚痛點才能給出真正有用的建議，而不是亂推一個。',ref:'📞 Sales Playbook > 產品定位'},
{type:'sc',topic:'產品綜合',context:'客戶是台北大安區一家泰式料理，有 60 個座位，老闆說：「我有訂位、有 LINE 官帳、也有一些老客人，但我不知道從哪裡開始改善。你覺得我最需要哪個？」',q:'老闆把問題丟給你，要你給出建議。但你還沒做完整的 Discovery，不知道哪個問題最大。你現在應該怎麼做？請說明你的應對方式。',placeholder:'例如：「我很想幫您做出最準確的建議，但在給您答案之前……」',rubric:['沒有直接說「買 TMS 就對了」（沒問清楚就推）','說明需要先了解哪個問題最讓他頭痛','問出 1–2 個關鍵問題幫助定位（電話量？LINE 訊息量？老客人回購率？）','讓對方感覺你是在幫他，不是在推銷']}
{type:'sc',topic:'TMS',context:'客戶是一家有包廂和散座的日式料理，老闆說：「我現在用白板和便利貼管桌位，尖峰時段搞得很混亂，有時候會把同一桌給兩組客人。」',q:'老闆已經說出了明確的痛點。用「痛點 → 解法 → 結果」的框架，介紹 TMS 如何解決他的問題。不要說功能清單，說對他的實際改變。',placeholder:'例如：「您說的桌位衝突，正是很多餐廳用人工管理時最常發生的狀況……」',rubric:['對應到老闆說的具體痛點（白板管理、雙重訂位）','說明 TMS 如何解決這個問題（一個畫面看到所有桌況）','說出結果（不會再發生雙重訂位的狀況）','沒有報功能清單，而是說對老闆的改變']},
{type:'sc',topic:'AI Chatbot',context:'你在做 Discovery，客戶說：「我的員工很習慣現在的方式，就是他們自己回 LINE，我擔心換成 AI 之後客人感受會變差。」',q:'客戶擔心 AI 取代人工回覆會讓客服品質下降。如何說明 AI Chatbot 的設計邏輯，消除他的顧慮？請打出完整回應。',placeholder:'例如：「這個擔心很合理，很多老闆一開始也是這樣想……」',rubric:['認同客戶的擔心是合理的（不反駁）','說明 AI 只處理重複性問題，複雜的還是員工回','說明員工因此可以有更多時間處理真正需要人的問題','說明客人體驗反而可能更好（回覆更快）']},
];
const AK='';
let cur=0,score=0,answers=[],sel=null;
const MC=QS.filter(q=>q.type==='mc').length,SC=QS.filter(q=>q.type==='sc').length,total=QS.length;
function setProg(){document.getElementById('prog').style.width=(cur/total*100)+'%'}
function render(){setProg();QS[cur].type==='mc'?renderMC():renderSC();}
function renderMC(){const q=QS[cur];const L=['A','B','C','D'];document.getElementById('qb').innerHTML=`<div class="qm"><span class="qb bmc">選擇題</span><span class="qn">${cur+1}/${total}</span><span class="qn" style="margin-left:auto">${q.topic}</span></div><div class="qt">${q.q}</div><div class="opts">${q.opts.map((o,i)=>`<div class="opt" id="o${i}" onclick="pick(${i})"><div class="ol">${L[i]}</div><div class="ot">${o}</div></div>`).join('')}</div><div id="fb"></div><div class="nav"><span id="hint" style="font-size:13px;color:#73726c">選一個答案</span><div class="nr"><button class="btn bp" id="cbtn" onclick="confirm2()" style="display:none">確認答案</button><button class="btn bp" id="nbtn" onclick="nextQ()" style="display:none">${cur===total-1?'看成績':'下一題 →'}</button></div></div>`;sel=null;}
function pick(i){if(document.getElementById('nbtn').style.display!=='none')return;document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));document.getElementById('o'+i).classList.add('sel');sel=i;document.getElementById('cbtn').style.display='inline-block';document.getElementById('hint').textContent='';}
function confirm2(){if(sel===null)return;const q=QS[cur];const ok=sel===q.ans;if(ok)score++;answers.push({idx:cur,type:'mc',correct:ok,q});document.querySelectorAll('.opt').forEach((el,i)=>{if(i===q.ans)el.classList.add('ok');else if(i===sel&&!ok)el.classList.add('no');});document.getElementById('fb').innerHTML=`<div class="fb ${ok?'ok':'no'}">${ok?'<strong>正確</strong>':'<strong>答錯了</strong> — 正確答案是 <strong>'+['A','B','C','D'][q.ans]+'</strong>'}<br>${q.explain}<div class="rf">複習：${q.ref}</div></div>`;document.getElementById('cbtn').style.display='none';document.getElementById('nbtn').style.display='inline-block';}
function renderSC(){const q=QS[cur];document.getElementById('qb').innerHTML=`<div class="qm"><span class="qb bsc">情境題</span><span class="qn">${cur+1}/${total}</span><span class="qn" style="margin-left:auto">${q.topic}</span></div><div class="qctx">${q.context}</div><div class="qt">${q.q}</div><div style="font-size:13px;color:#73726c;margin-bottom:.5rem">你的回應</div><textarea class="sca" id="sca" placeholder="${q.placeholder}" oninput="chk()"></textarea><div style="font-size:12px;color:#73726c;margin-top:.4rem">沒有標準答案，AI 根據評分標準逐項批改</div><div id="fb" style="margin-top:1rem"></div><div class="nav" style="margin-top:1rem"><span></span><div class="nr" id="scnav"><button class="btn bp" id="scbtn" onclick="submitSC()" disabled>AI 批改</button></div></div>`;}
function chk(){const b=document.getElementById('scbtn');if(b)b.disabled=document.getElementById('sca').value.trim().length<10;}
async function submitSC(){const q=QS[cur];const ans=document.getElementById('sca').value.trim();const btn=document.getElementById('scbtn');btn.disabled=true;btn.textContent='批改中…';const prompt=`你是 inline（台灣餐廳 SaaS）SDR 主管，正在批改新人的產品知識練習。\n\nOcard 背景知識：Ocard 是第三方會員行銷平台，inline 提供免費串接（串接本身不收費，但客戶需要自己申辦 Ocard）。本來有在用 Ocard 的店家吸引力更大。\n\n情境：${q.context}\n問題：${q.q}\n學員回答：${ans}\n\n評分標準（每項 1 分）：\n${q.rubric.map((r,i)=>`${i+1}. ${r}`).join('\n')}\n\n請用繁體中文回覆，只輸出 JSON：\n{"score":數字,"total":${q.rubric.length},"passed":[通過編號從1開始],"missed":[未通過編號],"comment":"2-3句評語","suggestion":"30字以內更好話術"}`;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});const data=await res.json();const r=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());const ok=r.score>=Math.ceil(q.rubric.length*0.6);if(ok)score+=0.5;answers.push({idx:cur,type:'sc',correct:ok,result:r,q});document.getElementById('fb').innerHTML=`<div class="fb ${ok?'ok':'no'}"><strong>${ok?'通過':'需要加強'}</strong> — ${r.score}/${r.total} 分<br>${r.comment}<div class="sbox"><strong>更好的說法：</strong>${r.suggestion}</div>${r.passed.length?`<div class="rf">達成：${r.passed.map(i=>q.rubric[i-1]).join('、')}</div>`:''}</div>`;btn.style.display='none';const nb=document.createElement('button');nb.className='btn bp';nb.textContent=cur===total-1?'看成績':'下一題 →';nb.onclick=nextQ;document.getElementById('scnav').appendChild(nb);}catch(e){btn.disabled=false;btn.textContent='AI 批改';document.getElementById('fb').innerHTML='<div class="fb no">批改失敗，請再試一次。</div>';}}
function nextQ(){cur++;cur>=total?showResult():render();}
function showResult(){document.getElementById('prog').style.width='100%';const mcOk=answers.filter(a=>a.type==='mc'&&a.correct).length;const scOk=answers.filter(a=>a.type==='sc'&&a.correct).length;const pct=Math.round((score/(MC+SC*0.5))*100);let grade,gc;if(pct>=85){grade='優秀 — 產品知識紮實';gc='#085041'}else if(pct>=70){grade='良好 — 幾個產品還需加強';gc='#633806'}else{grade='需要加強 — 建議重新複習產品頁面';gc='#791F1F'}const tm={};answers.forEach(a=>{if(!tm[a.q.topic])tm[a.q.topic]={p:0,t:0};tm[a.q.topic].t++;if(a.correct)tm[a.q.topic].p++;});const weak=Object.entries(tm).filter(([,v])=>v.p/v.t<0.6);const refs={TMS:'📦 Product Knowledge > TMS','LINE AI Call':'📦 Product Knowledge > LINE AI Call','AI Chatbot':'📦 Product Knowledge > AI Chatbot','AI EDM':'📦 Product Knowledge > AI EDM','Ocard 串接':'📦 Product Knowledge > Ocard 串接','產品綜合':'📞 Sales Playbook > 產品定位'};const prodList=['TMS','LINE AI Call','AI Chatbot','AI EDM','Ocard 串接'];const statCards=prodList.map(p=>{const d=tm[p]||{p:0,t:0};const col=d.t===0?'#73726c':d.p/d.t>=0.6?'#085041':'#791F1F';return `<div class="sc"><div class="sv" style="color:${col}">${d.t?Math.round(d.p/d.t*100):'-'}<span style="font-size:8px">%</span></div><div class="sl">${p}</div></div>`;}).join('');const rev=answers.map((a,i)=>{const body=a.type==='mc'&&!a.correct?`<div class="rb">${a.q.explain}<br><span style="color:#534AB7;font-size:12px;display:block;margin-top:4px">複習：${a.q.ref}</span></div>`:'';return `<div class="ri"><div class="rh2 ${a.correct?'p':'f'}">${a.correct?'✓':'✗'} Q${i+1} ${a.q.topic}${a.type==='sc'?' 情境':''} — ${a.correct?'正確':'答錯'}</div>${body}</div>`;}).join('');document.getElementById('qb').innerHTML=`<div class="rh"><div class="rs">${pct}<span style="font-size:22px;color:#73726c">分</span></div><div class="rsub">選擇題 ${mcOk}/${MC} ・情境題 ${scOk}/${SC} 通過</div><div class="rg" style="color:${gc}">${grade}</div></div><div class="sl2">各產品正確率</div><div class="sg">${statCards}</div>${weak.length?`<div class="sl2">建議複習</div>${weak.map(([t])=>`<div class="wi"><div class="wt">${t}</div><div class="wd">${refs[t]||t}</div></div>`).join('')}`:'<div style="font-size:14px;color:#085041;background:#E1F5EE;padding:.75rem 1rem;border-radius:10px;margin-bottom:1rem">所有產品主題都通過了！</div>'}<div class="sl2" style="margin-top:1.5rem">每題回顧</div>${rev}<div style="margin-top:1.5rem"><button class="btn" onclick="restart()">↺ 重新考一次</button></div>`;}
function restart(){cur=0;score=0;answers=[];sel=null;render();}
render();
</script>
</body>
</html>
