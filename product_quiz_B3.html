<style>

.bmc{background:#EEEDFE;color:#534AB7}.bsc{background:#E1F5EE;color:#0F6E56}.qn{font-size:13px;color:#73726c}

.qctx{font-size:13px;color:#5f5e5a;background:#f5f5f3;border-left:3px solid #534AB7;padding:.75rem 1rem;border-radius:0 8px 8px 0;margin-bottom:1.25rem;line-height:1.6}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.opt{display:flex;align-items:flex-start;gap:10px;padding:.75rem 1rem;border:0.5px solid rgba(0,0,0,0.12);border-radius:10px;cursor:pointer;background:#fff;transition:background .15s}
.opt:hover{background:#f5f5f3}.opt.sel{border-color:#534AB7;background:#EEEDFE}.opt.ok{border-color:#1D9E75;background:#E1F5EE;cursor:default}.opt.no{border-color:#E24B4A;background:#FCEBEB;cursor:default}
.opt.ok .ol{background:#1D9E75;color:#fff}.opt.no .ol{background:#E24B4A;color:#fff}.opt.sel .ol{background:#534AB7;color:#fff}

.ot{font-size:14px;line-height:1.5}.btn{padding:.6rem 1.25rem;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;color:#1a1a18}

.rf{margin-top:.5rem;font-size:12px;opacity:.8}.sca{width:100%;padding:.75rem 1rem;border:0.5px solid rgba(0,0,0,0.12);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:90px;color:#1a1a18}.sca:focus{outline:none;border-color:#534AB7}
.rh{text-align:center;background:#f5f5f3;border-radius:12px;padding:1.5rem;margin-bottom:1.25rem}.rs{font-size:50px;font-weight:500}.rsub{font-size:14px;color:#73726c;margin-top:.2rem}.rg{font-size:17px;font-weight:500;margin:.75rem 0 0}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:1.25rem}.sc{background:#f5f5f3;border-radius:8px;padding:.6rem .3rem;text-align:center}.sv{font-size:14px;font-weight:500}.sl{font-size:9px;color:#73726c;margin-top:2px}
.wi{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:.75rem 1rem;margin-bottom:.5rem}.wt{font-size:14px;font-weight:500;margin-bottom:2px}.wd{font-size:12px;color:#73726c}
.ri{border:0.5px solid rgba(0,0,0,0.1);border-radius:10px;overflow:hidden;margin-bottom:.6rem}.rh2{padding:.65rem 1rem;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.rh2.p{background:#E1F5EE;color:#085041}.rh2.f{background:#FCEBEB;color:#791F1F}.rb{padding:.75rem 1rem;font-size:13px;color:#5f5e5a;line-height:1.6;border-top:0.5px solid rgba(0,0,0,0.08)}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem}.nr{display:flex;gap:8px}

  <div class="header"><h1>產品知識測驗 — B3</h1><p>20 題・TMS / AI Call / Chatbot / EDM / Ocard 串接・全新題目</p></div>
  <div class="card"><div class="pb"><div class="pf" id="prog" style="width:0%"></div></div><div id="qb"></div></div>

<script>
const QS=[
{type:'mc',topic:'TMS',q:'客戶問「TMS 可以跟我們現有的訂位電話系統整合嗎？」正確應對是？',opts:['「可以，跟所有系統都能整合。」','「可以先了解您現在用的是什麼系統？這樣我才能跟您確認整合的方式，不是每種系統都一樣的。」','「完全不行，要換掉現有系統。」','「這個要問工程師，我不清楚。」'],ans:1,explain:'整合問題不能空口保證，也不能說不行。先問對方用什麼系統，才能給準確說明。這也是了解客戶技術環境的機會，對 AE 的 Meeting 有幫助。',ref:'📦 Product Knowledge > TMS'},
{type:'mc',topic:'TMS',q:'「超訂（Overbooking）」是什麼問題？TMS 如何解決？',opts:['超訂是訂太多外送，TMS 用 AI 分配','超訂是把同一個時段訂給超過桌位容量的客人，TMS 即時顯示桌況和訂位上限，自動避免超訂','超訂是員工上班超時，TMS 管員工排班','超訂是食材訂太多，TMS 幫管理庫存'],ans:1,explain:'超訂是很多用人工管訂位的餐廳都有的問題——沒有即時桌況，接了太多訂位但桌子翻不過來。TMS 即時顯示桌況和訂位上限，讓前台有根據地接訂位，不超訂。',ref:'📦 Product Knowledge > TMS'},
{type:'mc',topic:'TMS',q:'TMS 的「桌型設定」功能是指什麼？',opts:['讓餐廳買新桌子','在系統裡把餐廳的桌型（2 人桌、4 人桌、包廂）和位置都設定進去，讓系統知道每種桌子的容量，才能做精準的訂位分配','讓客人選擇想坐哪種桌子','讓廚房知道要準備幾種菜單'],ans:1,explain:'桌型設定是 TMS 的基礎設定——把餐廳的座位地圖輸入進去，每種桌型的數量和容量都設定好，系統才能精準分配訂位，避免 2 人佔了 6 人桌的浪費。',ref:'📦 Product Knowledge > TMS'},
{type:'mc',topic:'LINE AI Call',q:'一家餐廳說「我已經有語音信箱了，跟你們的 AI Call 有什麼差別？」你應該怎麼回應？',opts:['「語音信箱就夠了，你不需要我們。」','「語音信箱是把聲音錄下來，你還是要自己聽錄音再整理。我們的 AI Call 是把客人說的話直接整理成文字推送給你，你一眼就看到「3 個人、晚上 7 點訂位」，不需要聽錄音猜意思。」','「我們的 AI 比語音信箱更現代。」','「語音信箱和我們一樣，你說得對。」'],ans:1,explain:'語音信箱只是「錄音」，還是要自己聽和整理。AI Call 是「理解 + 整理 + 推送」——直接給你結構化的訊息（幾點、幾人、要求）。這是效率上的根本差異。',ref:'📦 Product Knowledge > LINE AI Call'},
{type:'mc',topic:'LINE AI Call',q:'LINE AI Call 對「連鎖餐廳」有什麼額外的價值？',opts:['讓所有分店共用一個電話號碼','每家分店都可以獨立部署 AI Call，總部可以統一管理所有分店的未接來電狀況，不需要分別追','讓所有電話轉到總部','讓每家分店不需要電話'],ans:1,explain:'連鎖餐廳的電話管理問題是多點分散——每家店的漏接狀況要分別確認很麻煩。每家店部署 AI Call 後，未接來電統一整理，總部可以有統一視圖。',ref:'📦 Product Knowledge > LINE AI Call'},
{type:'mc',topic:'AI Chatbot',q:'客戶問「AI Chatbot 可以幫我接受 LINE 訂位嗎？」正確的說明是？',opts:['完全可以，所有訂位都 AI 自動完成','可以設定讓 AI Chatbot 引導客人提供訂位所需資訊（日期、時間、人數），再傳給餐廳確認，但最終確認通常還是需要人工','不行，訂位一定要人工','可以，AI 會直接把訂位寫進 TMS'],ans:1,explain:'AI Chatbot 可以引導客人提供訂位資訊，但訂位確認通常需要人工——特別是要看桌況的情況。這樣說最準確，也避免客戶期望落差。',ref:'📦 Product Knowledge > AI Chatbot'},
{type:'mc',topic:'AI Chatbot',q:'「知識庫」在 AI Chatbot 裡面是什麼意思？',opts:['AI Chatbot 儲存客人資料的地方','餐廳把所有常見問題和答案輸入進去的資料庫，AI 根據這個知識庫來回答問題','AI 自己上網搜尋答案的地方','系統記錄所有對話的地方'],ans:1,explain:'知識庫就是 AI 的「答案資料庫」——你告訴 AI 「我們幾點開門、停車場在哪、包廂費用是多少」，AI 就根據這個回答客人。知識庫越完整，AI 能回答的問題越多。',ref:'📦 Product Knowledge > AI Chatbot'},
{type:'mc',topic:'AI EDM',q:'什麼是「Email 行銷的轉換率」？對餐廳意味著什麼？',opts:['Email 有多少封成功送達的比例','收到 Email 的客人裡，有多少人採取了行動（例如點連結、訂位、來消費）的比例','Email 有多少封被退回的比例','員工發 Email 的速度'],ans:1,explain:'轉換率是 EDM 效果最直接的衡量——100 個人收到 Email，有 5 個人來訂位，轉換率就是 5%。對餐廳來說，每次 EDM 活動的轉換率高低，就是能不能帶回老客人的指標。',ref:'📦 Product Knowledge > AI EDM'},
{type:'mc',topic:'AI EDM',q:'客戶說「我有請人在管 IG 和 Facebook，還需要 Email 行銷嗎？」你怎麼回應？',opts:['「有 IG 就夠了，不需要 EDM。」','「社群媒體和 Email 行銷是不同渠道——IG 是對公開受眾曝光，EDM 是對你的老客人精準溝通。有人點了 IG 廣告但你不知道他是誰；但你的 Email 名單裡每個人你都認識，是最高價值的渠道。」','「IG 比 Email 更重要，你可以不用 EDM。」','「那你不需要我們的 AI EDM 了。」'],ans:1,explain:'社群媒體 = 對外廣播；Email = 對已知客人精準溝通。兩者不互相取代，而是互補。Email 名單是餐廳真正擁有的資產，不依賴演算法，是最直接的老客人聯繫渠道。',ref:'📦 Product Knowledge > AI EDM'},
{type:'mc',topic:'AI EDM',q:'AI EDM 的「發送時間優化」功能是什麼意思？',opts:['AI 決定你什麼時候要工作','AI 根據歷史資料分析，什麼時間點這個群的客人最可能開信，推薦在那個時間發送','AI 自動在固定時間每天發一封 Email','讓你可以排程 Email 在指定時間發送'],ans:1,explain:'發送時間會直接影響開信率。AI 根據過去這批收件人的開信行為，找出他們最活躍的時間點建議你發，比固定在週五下午發更有根據。',ref:'📦 Product Knowledge > AI EDM'},
{type:'mc',topic:'Ocard 串接',q:'一家餐廳有用 Ocard 管會員點數，但訂位是用 LINE 自己管。導入 inline TMS 並串接 Ocard 後，最大的改變是什麼？',opts:['Ocard 的功能被 inline 取代了','訂位資料（誰來、幾人、何時）和 Ocard 的會員消費資料打通，餐廳可以看到「這個會員上次訂位是兩個月前，消費了 XX 元，現在應該發 EDM 召回他」','inline 幫 Ocard 管點數','Ocard 幫 inline 管訂位'],ans:1,explain:'串接的核心價值是資料打通——訂位行為 + 消費行為整合在一起，餐廳才能做真正精準的會員行銷，而不是靠感覺猜客人什麼時候可能回來。',ref:'📦 Product Knowledge > Ocard 串接'},
{type:'mc',topic:'Ocard 串接',q:'關於 inline 和 Ocard 串接，以下哪個說法最正確？',opts:['買 inline 就自動包含 Ocard，不需要另外申辦','inline 提供免費串接，但客戶仍需要自己申辦 Ocard 帳號；串接這件事 inline 不收費','Ocard 是 inline 的功能之一，不是獨立的平台','只有已用 Ocard 的店家才能使用 inline'],ans:1,explain:'inline 和 Ocard 是兩個獨立的平台。inline 提供免費串接，串接本身不收費，但客戶需要自己去申辦 Ocard 帳號。對本來就有用 Ocard 的店家，這個串接吸引力更大，因為不需要額外費用就能打通兩邊資料。',ref:'📦 Product Knowledge > Ocard 串接'},
{type:'mc',topic:'產品綜合',q:'客戶說「我在 foodpanda 和 Uber Eats 上都有，也有實體店，客人問題很多，我已經被 LINE 搞死了。」最合適的產品是？',opts:['TMS（管理內用桌位）','AI Chatbot（自動回覆 LINE 上大量重複性問題，讓員工從 LINE 客服的泥沼中解放出來）','AI EDM（發 Email 給老客人）','LINE AI Call（補漏接電話）'],ans:1,explain:'「被 LINE 搞死」= LINE 訊息量太大，員工不停在回 → AI Chatbot 是最直接的解。外送 + 實體店的客人問題類型很多，但重複性的標準問題佔大多數，正是 Chatbot 最擅長的。',ref:'📞 Sales Playbook > 產品定位'},
{type:'mc',topic:'產品綜合',q:'客戶說「我只想要一個可以管訂位又可以聯繫老客人的系統，最好一個就搞定。」你怎麼回應？',opts:['「我們有一個全功能套裝，一次解決全部。」','「我理解您想要簡單。讓我說明一下：TMS 負責管訂位，AI EDM 負責聯繫老客人，這兩個加在一起其實就是您說的需求。而且兩個一起導入也不複雜，我可以讓顧問跟您說明流程。」','「我們沒有一個系統可以做到全部。」','「那你要等我們出套裝方案。」'],ans:1,explain:'客戶說的需求（訂位 + 聯繫老客人）剛好對應 TMS + AI EDM。不要說「我們沒有套裝」讓客戶失望，而是說「這兩個加起來就是您要的，導入也不複雜」——化解疑慮同時推進。',ref:'📞 Sales Playbook > 產品定位'},
{type:'mc',topic:'產品綜合',q:'你完成 Discovery 後發現客戶適合 TMS + LINE AI Call，但他說「我只有預算先買一個」。你怎麼建議他的優先順序？',opts:['永遠先推較貴的產品','根據他最痛的問題決定——如果桌位混亂更嚴重先買 TMS，如果電話漏接損失更大先買 LINE AI Call','永遠先推 TMS 因為它是基礎','讓客戶自己決定，你不表態'],ans:1,explain:'優先順序應該由痛點決定，不是由產品的價格或你的業績考量。哪個問題造成的損失更大、更緊迫，就先解決那個。你給出有根據的建議，客戶會更信任你。',ref:'📞 Sales Playbook > 產品定位'},
{type:'mc',topic:'產品綜合',q:'client 問「你們有沒有試用版本可以先試試看？」正確應對是？',opts:['「沒有，要買才能用。」','先了解公司的試用政策，如果有就說明流程；如果沒有，可以說「我們通常會安排一個 Demo 讓您看實際操作，比試用更有效率——因為 Demo 是根據您的情況客製化說明，30 分鐘就知道合不合適。」','「試用要付費。」','「我幫您申請，等我消息。」'],ans:1,explain:'試用需求背後是「我不確定值不值得」的顧慮。如果沒有試用，Demo 是最好的替代——比讓客戶自己摸索更有效率，而且 Demo 可以根據客戶情況客製化，轉換率更高。',ref:'📦 Product Knowledge'},
{type:'mc',topic:'產品綜合',q:'一家客戶問「你們有沒有幫餐廳管 Google Maps 評論的功能？」inline 沒有這個功能，你應該怎麼說？',opts:['說「有，我們可以管」（錯誤承諾）','說「沒有，我們只做訂位和客服。但我們做的是讓客人在店內體驗更好、回客率更高，口碑自然會提升。」','說「這個功能正在開發中，等我們消息」','說「Google Maps 不重要，你不用管」'],ans:1,explain:'不能承諾沒有的功能。誠實說明 inline 的範疇，同時把對話拉回我們真正解決的問題：提升店內體驗和回客率，這才是影響口碑的根本。',ref:'📦 Product Knowledge > About inline'},
{type:'sc',topic:'Ocard 串接',context:'你在介紹 inline，客戶（有在用 Ocard 的火鍋店老闆）說：「我已經有 Ocard 了，你還要我再買 inline？我為什麼要多一個系統？」',q:'客戶覺得 Ocard 已經夠了，不理解為什麼還需要 inline。你需要說明 inline 和 Ocard 解決的是不同問題，以及免費串接對他的具體加乘價值。請打出完整回應。',placeholder:'例如：「完全理解您的疑問，Ocard 和 inline 解決的其實是不同的問題……」',rubric:['不說 Ocard 不好，認可它在會員行銷的強項','說明 inline 解決的是訂位和現場流程（Ocard 做不到）','說明 inline 跟 Ocard 免費串接，兩邊資料打通讓他更了解消費者','結尾讓對方覺得兩個加在一起比單用 Ocard 更完整']}
{type:'sc',topic:'AI EDM',context:'你在做 Discovery，客戶（一家連鎖早午餐，有 3 家店）說：「我有很多老客人，但我不知道怎麼讓他們再回來。我試過在 IG 上發貼文打折，但效果很差。」',q:'客戶有老客人基礎，有過 IG 行銷失敗的經驗，但沒有試過 Email 行銷。用你對 AI EDM 的產品知識，說明為什麼 IG 和 EDM 是不同的，以及 AI EDM 如何具體幫到他。',placeholder:'例如：「我理解，IG 打折貼文的問題在於……」',rubric:['說明 IG 和 EDM 的根本差異（公開廣播 vs 精準聯繫老客人）','說明 AI EDM 如何讓他聯繫到「已知的老客人」','說明 AI 生成文案讓他不需要行銷背景','結尾引導他說出他有多少老客人的聯絡資料']},
{type:'sc',topic:'產品綜合',context:'AE 在 Meeting 之後跟你說：「我跟客戶聊完，他其實對 TMS 很有興趣，但你在交接資料裡寫的是 AI Call。你當初 Discovery 的時候是怎麼判斷的？」',q:'你發現你在 Discovery 時對客戶需求的判斷可能有誤。這個情況下你應該如何回應 AE，以及下次如何避免這種誤判？',placeholder:'例如：「抱歉，我在 Discovery 的時候可能問的方向……」',rubric:['誠實承認可能有判斷偏差，不推卸責任','說明自己 Discovery 時的思路（為什麼當時判斷是 AI Call）','說明下次如何更全面地 Discovery 避免誤判','表達願意補問客戶確認，支援 AE 的後續']},
];
const AK='';
let cur=0,score=0,answers=[],sel=null;
const MC=QS.filter(q=>q.type==='mc').length,SC=QS.filter(q=>q.type==='sc').length,total=QS.length;
function setProg(){document.getElementById('prog').style.width=(cur/total*100)+'%'}
function render(){setProg();QS[cur].type==='mc'?renderMC():renderSC();}
function renderMC(){const q=QS[cur];const L=['A','B','C','D'];document.getElementById('qb').innerHTML=`<div class="qm"><span class="qb bmc">選擇題</span><span class="qn">${cur+1}/${total}</span><span class="qn" style="margin-left:auto">${q.topic}</span></div><div class="qt">${q.q}</div><div class="opts">${q.opts.map((o,i)=>`<div class="opt" id="o${i}" onclick="pick(${i})"><div class="ol">${L[i]}</div><div class="ot">${o}</div></div>`).join('')}</div><div id="fb"></div><div class="nav"><span id="hint" style="font-size:13px;color:#73726c">選一個答案</span><div class="nr"><button class="btn bp" id="cbtn" onclick="confirm2()" style="display:none">確認答案</button><button class="btn bp" id="nbtn" onclick="nextQ()" style="display:none">${cur===total-1?'看成績':'下一題 →'}</button></div></div>`;sel=null;}
function pick(i){if(document.getElementById('nbtn').style.display!=='none')return;document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));document.getElementById('o'+i).classList.add('sel');sel=i;document.getElementById('cbtn').style.display='inline-block';document.getElementById('hint').textContent='';}
function confirm2(){if(sel===null)return;const q=QS[cur];const ok=sel===q.ans;if(ok)score++;answers.push({idx:cur,type:'mc',correct:ok,q});document.querySelectorAll('.opt').forEach((el,i)=>{if(i===q.ans)el.classList.add('ok');else if(i===sel&&!ok)el.classList.add('no');});document.getElementById('fb').innerHTML=`<div class="fb ${ok?'ok':'no'}">${ok?'<strong>正確</strong>':'<strong>答錯了</strong> — 正確答案是 <strong>'+['A','B','C','D'][q.ans]+'</strong>'}<br>${q.explain}<div class="rf">複習：${q.ref}</div></div>`;document.getElementById('cbtn').style.display='none';document.getElementById('nbtn').style.display='inline-block';}
function renderSC(){const q=QS[cur];document.getElementById('qb').innerHTML=`<div class="qm"><span class="qb bsc">情境題</span><span class="qn">${cur+1}/${total}</span><span class="qn" style="margin-left:auto">${q.topic}</span></div><div class="qctx">${q.context}</div><div class="qt">${q.q}</div><div style="font-size:13px;color:#73726c;margin-bottom:.5rem">你的回應</div><textarea class="sca" id="sca" placeholder="${q.placeholder}" oninput="chk()"></textarea><div style="font-size:12px;color:#73726c;margin-top:.4rem">沒有標準答案，AI 根據評分標準逐項批改</div><div id="fb" style="margin-top:1rem"></div><div class="nav" style="margin-top:1rem"><span></span><div class="nr" id="scnav"><button class="btn bp" id="scbtn" onclick="submitSC()" disabled>AI 批改</button></div></div>`;}
function chk(){const b=document.getElementById('scbtn');if(b)b.disabled=document.getElementById('sca').value.trim().length<10;}
async function submitSC(){const q=QS[cur];const ans=document.getElementById('sca').value.trim();const btn=document.getElementById('scbtn');btn.disabled=true;btn.textContent='批改中…';const prompt=`你是 inline（台灣餐廳 SaaS）SDR 主管，正在批改新人的產品知識練習。\n\nOcard 背景知識：Ocard 是第三方會員行銷平台，inline 提供免費串接（串接本身不收費，但客戶需要自己申辦 Ocard）。本來有在用 Ocard 的店家吸引力更大。\n\n情境：${q.context}\n問題：${q.q}\n學員回答：${ans}\n\n評分標準（每項 1 分）：\n${q.rubric.map((r,i)=>`${i+1}. ${r}`).join('\n')}\n\n請用繁體中文回覆，只輸出 JSON：\n{"score":數字,"total":${q.rubric.length},"passed":[通過編號從1開始],"missed":[未通過編號],"comment":"2-3句評語","suggestion":"30字以內更好話術"}`;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':AK,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});const data=await res.json();const r=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());const ok=r.score>=Math.ceil(q.rubric.length*0.6);if(ok)score+=0.5;answers.push({idx:cur,type:'sc',correct:ok,result:r,q});document.getElementById('fb').innerHTML=`<div class="fb ${ok?'ok':'no'}"><strong>${ok?'通過':'需要加強'}</strong> — ${r.score}/${r.total} 分<br>${r.comment}<div class="sbox"><strong>更好的說法：</strong>${r.suggestion}</div>${r.passed.length?`<div class="rf">達成：${r.passed.map(i=>q.rubric[i-1]).join('、')}</div>`:''}</div>`;btn.style.display='none';const nb=document.createElement('button');nb.className='btn bp';nb.textContent=cur===total-1?'看成績':'下一題 →';nb.onclick=nextQ;document.getElementById('scnav').appendChild(nb);}catch(e){btn.disabled=false;btn.textContent='AI 批改';document.getElementById('fb').innerHTML='<div class="fb no">批改失敗，請再試一次。</div>';}}
function nextQ(){cur++;cur>=total?showResult():render();}
function showResult(){document.getElementById('prog').style.width='100%';const mcOk=answers.filter(a=>a.type==='mc'&&a.correct).length;const scOk=answers.filter(a=>a.type==='sc'&&a.correct).length;const pct=Math.round((score/(MC+SC*0.5))*100);let grade,gc;if(pct>=85){grade='優秀 — 產品知識紮實';gc='#085041'}else if(pct>=70){grade='良好 — 幾個產品還需加強';gc='#633806'}else{grade='需要加強 — 建議重新複習產品頁面';gc='#791F1F'}const tm={};answers.forEach(a=>{if(!tm[a.q.topic])tm[a.q.topic]={p:0,t:0};tm[a.q.topic].t++;if(a.correct)tm[a.q.topic].p++;});const weak=Object.entries(tm).filter(([,v])=>v.p/v.t<0.6);const refs={TMS:'📦 Product Knowledge > TMS','LINE AI Call':'📦 Product Knowledge > LINE AI Call','AI Chatbot':'📦 Product Knowledge > AI Chatbot','AI EDM':'📦 Product Knowledge > AI EDM','Ocard 串接':'📦 Product Knowledge > Ocard 串接','產品綜合':'📞 Sales Playbook > 產品定位'};const prodList=['TMS','LINE AI Call','AI Chatbot','AI EDM','Ocard 串接'];const statCards=prodList.map(p=>{const d=tm[p]||{p:0,t:0};const col=d.t===0?'#73726c':d.p/d.t>=0.6?'#085041':'#791F1F';return `<div class="sc"><div class="sv" style="color:${col}">${d.t?Math.round(d.p/d.t*100):'-'}<span style="font-size:8px">%</span></div><div class="sl">${p}</div></div>`;}).join('');const rev=answers.map((a,i)=>{const body=a.type==='mc'&&!a.correct?`<div class="rb">${a.q.explain}<br><span style="color:#534AB7;font-size:12px;display:block;margin-top:4px">複習：${a.q.ref}</span></div>`:'';return `<div class="ri"><div class="rh2 ${a.correct?'p':'f'}">${a.correct?'✓':'✗'} Q${i+1} ${a.q.topic}${a.type==='sc'?' 情境':''} — ${a.correct?'正確':'答錯'}</div>${body}</div>`;}).join('');document.getElementById('qb').innerHTML=`<div class="rh"><div class="rs">${pct}<span style="font-size:22px;color:#73726c">分</span></div><div class="rsub">選擇題 ${mcOk}/${MC} ・情境題 ${scOk}/${SC} 通過</div><div class="rg" style="color:${gc}">${grade}</div></div><div class="sl2">各產品正確率</div><div class="sg">${statCards}</div>${weak.length?`<div class="sl2">建議複習</div>${weak.map(([t])=>`<div class="wi"><div class="wt">${t}</div><div class="wd">${refs[t]||t}</div></div>`).join('')}`:'<div style="font-size:14px;color:#085041;background:#E1F5EE;padding:.75rem 1rem;border-radius:10px;margin-bottom:1rem">所有產品主題都通過了！</div>'}<div class="sl2" style="margin-top:1.5rem">每題回顧</div>${rev}<div style="margin-top:1.5rem"><button class="btn" onclick="restart()">↺ 重新考一次</button></div>`;}
function restart(){cur=0;score=0;answers=[];sel=null;render();}
render();
</script>
</body>
</html>
